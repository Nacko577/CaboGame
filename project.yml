name: CaboGame
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: 17.0

settings:
  base:
    SWIFT_VERSION: 5.0
    PRODUCT_BUNDLE_IDENTIFIER: com.alex.CaboGame
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: CaboGame
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_NSLocalNetworkUsageDescription: CaboGame uses your local network to discover nearby players.
    INFOPLIST_KEY_NSBonjourServices:
      - _cabo-local._tcp

targets:
  CaboGame:
    type: application
    platform: iOS
    sources:
      - ios/CaboGame
    settings:
      base:
        PRODUCT_NAME: CaboGame
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    scheme:
      testTargets: []
